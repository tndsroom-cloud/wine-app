<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>Wine Dashboard</title>
  <style>
    body { font-family: Arial; padding: 20px; background: #f4f6f8; }
    h1 { margin-bottom: 20px; }
    .cards { display: flex; gap: 20px; margin-bottom: 20px; }
    .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 6px rgba(0,0,0,0.1); flex: 1; font-size: 20px; }
    table { width: 100%; border-collapse: collapse; background: white; border-radius: 12px; overflow: hidden; direction: rtl; }
    th { background: #2c3e50; color: white; padding: 10px; text-align: right; }
    td { padding: 10px; border-bottom: 1px solid #eee; text-align: right; }
    tr:hover { background: #f1f1f1; }
    .btn-received { background: #2d8a4e; color: white; border: none; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: bold; }
    .btn-received:hover { background: #236b3e; }
    .status-ordered { color: #e67e22; font-weight: bold; }
    .status-received { color: #2d8a4e; font-weight: bold; }
    .rating-select { padding: 4px; border-radius: 4px; border: 1px solid #ccc; font-size: 14px; }
    .rating-display { font-weight: bold; color: #2c3e50; }
  </style>
</head>
<body>

<h1>📊 הדשבורד שלי</h1>

<div class="cards">
  <div class="card">סה״כ בקבוקים: <span id="total">טוען...</span></div>
  <div class="card">דירוג ממוצע: <span id="avg">טוען...</span></div>
</div>

<table>
  <thead>
    <tr>
      <th>שם היין</th>
      <th>יקב</th>
      <th>קטגוריה</th>
      <th>מדינה</th>
      <th>ענב</th>
      <th>מחיר</th>
      <th>כמות</th>
      <th>מקור</th>
      <th>סטטוס</th>
      <th>דירוג</th>
    </tr>
  </thead>
  <tbody id="tableBody"></tbody>
</table>

<script>
var API = "https://wine-scan.tnd-sroom.workers.dev";
function updateRating(id, rating) {
  fetch(API + "/update-rating", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ id: id, rating: parseFloat(rating) })
  });
}

function markReceived(id, btn) {
  fetch(API + "/update-status", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ id: id, status: "התקבל" })
  })
  .then(function(res) { return res.json(); })
  .then(function(data) {
    if (data.success) {
      var row = btn.closest("tr");
      var cell = row.querySelector(".status-cell");
      cell.innerHTML = '<span class="status-received">✅ התקבל</span>';
    }
  });
}

async function load() {
  try {
    var dashRes = await fetch(API + "/dashboard");
    var dash = await dashRes.json();
    document.getElementById("total").innerText = dash.totalBottles;
    document.getElementById("avg").innerText = dash.avgRating;
  } catch (e) {
    console.log("dashboard error", e);
  }

  try {
    var res = await fetch(API + "/bottles");
    var bottles = await res.json();
    var tbody = document.getElementById("tableBody");
    tbody.innerHTML = "";

    bottles.forEach(function(b) {
      var statusHTML = "";
      if (b.status === "התקבל") {
        statusHTML = '<span class="status-received">✅ התקבל</span>';
      } else {
        statusHTML = '<span class="status-ordered">📧 הוזמן</span> <button class="btn-received" onclick="markReceived(' + b.id + ', this)">התקבל</button>';
      }

      var ratingVal = b.rating || 0;
      var options = "";
      for (var r = 0; r <= 10; r++) {
        var sel = (r == ratingVal) ? " selected" : "";
        options += "<option value='" + r + "'" + sel + ">" + r + "</option>";
      }
      var ratingHTML = "<select class='rating-select' onchange='updateRating(" + b.id + ", this.value)'>" + options + "</select>";

      var row = "<tr>" +
        "<td>" + (b.name || "") + "</td>" +
        "<td>" + (b.winery || "") + "</td>" +
        "<td>" + (b.category || "") + "</td>" +
        "<td>" + (b.country || "") + "</td>" +
        "<td>" + (b.grape || "") + "</td>" +
        "<td>" + (b.unit_price || "") + "</td>" +
        "<td>" + (b.quantity || "") + "</td>" +
        "<td>" + (b.source || "") + "</td>" +
        '<td class="status-cell">' + statusHTML + '</td>' +
        "<td>" + ratingHTML + "</td>" +
        "</tr>";
      tbody.innerHTML += row;
    });
  } catch (e) {
    console.log("bottles error", e);
  }
}

load();
</script>

</body>
</html>
