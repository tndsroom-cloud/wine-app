<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>Wine Dashboard</title>
  <style>
    body { font-family: Arial; padding: 20px; background: #f4f6f8; }
    h1 { margin-bottom: 20px; }
    .cards { display: flex; gap: 20px; margin-bottom: 20px; }
    .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 6px rgba(0,0,0,0.1); flex: 1; font-size: 20px; }
    table { width: 100%; border-collapse: collapse; background: white; border-radius: 12px; overflow: hidden; direction: rtl; }
    th { background: #2c3e50; color: white; padding: 10px; text-align: right; }
    td { padding: 10px; border-bottom: 1px solid #eee; text-align: right; }
    tr:hover { background: #f1f1f1; }
  </style>
</head>
<body>

<h1>📊 הדשבורד שלי</h1>

<div class="cards">
  <div class="card">סה״כ בקבוקים: <span id="total">טוען...</span></div>
  <div class="card">דירוג ממוצע: <span id="avg">טוען...</span></div>
</div>

<table>
  <thead>
    <tr>
      <th>שם היין</th>
      <th>יקב</th>
      <th>קטגוריה</th>
      <th>מדינה</th>
      <th>ענב</th>
      <th>מחיר</th>
      <th>כמות</th>
      <th>מקור</th>
    </tr>
  </thead>
  <tbody id="tableBody"></tbody>
</table>

<script>
const API = "https://wine-scan.tnd-sroom.workers.dev";

async function load() {
  try {
    const dashRes = await fetch(API + "/dashboard");
    const dash = await dashRes.json();
    document.getElementById("total").innerText = dash.totalBottles;
    document.getElementById("avg").innerText = dash.avgRating;
  } catch (e) {
    console.log("dashboard error", e);
  }

  try {
    const res = await fetch(API + "/bottles");
    const bottles = await res.json();
    const tbody = document.getElementById("tableBody");
    tbody.innerHTML = "";

    bottles.forEach(function(b) {
      var row = "<tr>" +
        "<td>" + (b.name || "") + "</td>" +
        "<td>" + (b.winery || "") + "</td>" +
        "<td>" + (b.category || "") + "</td>" +
        "<td>" + (b.country || "") + "</td>" +
        "<td>" + (b.grape || "") + "</td>" +
        "<td>" + (b.unit_price || "") + "</td>" +
        "<td>" + (b.quantity || "") + "</td>" +
        "<td>" + (b.source || "") + "</td>" +
        "</tr>";
      tbody.innerHTML += row;
    });
  } catch (e) {
    console.log("bottles error", e);
  }
}

load();
</script>

</body>
</html>
